services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: truerag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truerag"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,s3
      DEFAULT_REGION: us-east-1
      PERSISTENCE: "1"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    profiles:
      - localstack

  init:
    image: amazon/aws-cli:2.15.0
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name truerag-ingestion >/dev/null
        aws --endpoint-url=http://localstack:4566 s3api create-bucket --bucket truerag-documents >/dev/null 2>&1 || true
    restart: "no"
    profiles:
      - localstack

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env.local
        required: false
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    volumes:
      - ./app:/app/app
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/health').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    build: .
    env_file:
      - path: .env.local
        required: false
    command: python -m app.workers.entrypoint
    volumes:
      - ./app:/app/app
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  mongo_data:
  pg_data:
  localstack_data:
