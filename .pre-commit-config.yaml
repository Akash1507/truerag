repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [check]
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [app/, --strict]
        additional_dependencies:
          - pydantic>=2.6.0
          - pydantic-settings>=2.2.0
          - fastapi>=0.111.0
