name: CI

on:
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: truerag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d truerag_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy --strict app/

      - name: Pytest unit tests
        env:
          MONGO_URL: mongodb://localhost:27017
          PG_DSN: postgresql://postgres:test@localhost:5432/truerag_test
        run: pytest tests/ -m "not integration" -v

      - name: Pytest integration tests
        env:
          MONGO_URL: mongodb://localhost:27017
          PG_DSN: postgresql://postgres:test@localhost:5432/truerag_test
        run: pytest tests/ -m integration -v
